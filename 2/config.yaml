          created: 1773827106082
          modified: 1773827106082
          sortKey: 3300
        requestId: req_133320d2bb524651a5836b249a8704ce
        code: |-
          const response = await insomnia.send();

          console.log('Response:', response.data);

          expect(response.status).to.equal(404);

          let body;
          try {
            body = JSON.parse(response.data);
            expect(body.metadata.status).to.equal('error');
          } catch (e) {
            // Even if JSON parse fails, status check is sufficient
            console.log('Response received with status 404');
          }
      - name: 4. [Kategori] Update Non-existent Returns 400
