spec:
  contents:
    swagger: "2.0"
    info:
      title: Canteen API
      version: 1.0.0
      description: API for managing canteen categories and menus
    host: localhost:8787
    basePath: /
    schemes:
      - http
    paths:
      /api/kategori:
        get:
          summary: Get all categories
          responses:
            "200":
              description: Success
        post:
          summary: Create a new category
          responses:
            "201":
              description: Created
      /api/kategori/{id}:
        get:
          summary: Get category by ID
          parameters:
            - name: id
              in: path
              required: true
              type: string
          responses:
            "200":
              description: Success
            "404":
              description: Not Found
        patch:
          summary: Update a category
          parameters:
            - name: id
              in: path
              required: true
              type: string
          responses:
            "200":
              description: Success
            "400":
              description: Bad Request
        delete:
          summary: Delete a category
          parameters:
            - name: id
              in: path
              required: true
              type: string
          responses:
            "200":
              description: Success
            "404":
              description: Not Found
      /api/menu:
        get:
          summary: Get all menu items
          responses:
            "200":
              description: Success
        post:
          summary: Create a new menu item
          responses:
            "201":
              description: Created
            "400":
              description: Bad Request
      /api/menu/{id}:
        get:
          summary: Get menu by ID
          parameters:
            - name: id
              in: path
              required: true
              type: string
          responses:
            "200":
              description: Success
            "404":
              description: Not Found
        patch:
          summary: Update a menu item
          parameters:
            - name: id
              in: path
              required: true
              type: string
          responses:
            "200":
              description: Success
            "400":
              description: Bad Request
        delete:
          summary: Delete a menu item
          parameters:
            - name: id
              in: path
              required: true
              type: string
          responses:
            "200":
              description: Success
            "404":
              description: Not Found
  meta:
    id: spc_42985ac0a3754522b4e3d058e5f723fb
    created: 1773827106028
    modified: 1773827304875
testSuites:
  - name: CRUD Verification (v8.6.1 Compatible)
    meta:
      id: uts_8816e5f15a8c4f488937c4af80f774b0
      created: 1773827106073
      modified: 1773827106073
      sortKey: 3000
    tests:
      - name: 1. [Kategori] Create Validation
        meta:
          id: ut_e2b472d7c91244b891abc940a99c7da8
          created: 1773827106077
          modified: 1773827106077
          sortKey: 3100
        requestId: req_13658d1634e14b698f05d7eb6e82f56e
        code: |-
          const response = await insomnia.send();

          console.log('Response:', response.data);

          let body;

          try {
            body = JSON.parse(response.data);
          } catch (e) {
            console.log('Raw response:', response.data);
            throw new Error('Invalid JSON response');
          }

          expect(response.status).to.equal(201);
          expect(body.metadata.status).to.equal('success');
          expect(body.data.nama_kategori).to.equal('Snack');

          // Store ID for reference only (won't persist)
          console.log('Created kategori ID:', body.data.id);
      - name: 2. [Kategori] List Structure
        meta:
          id: ut_2fb4bcc819af48c3abdba09feca57d9e
          created: 1773827106081
          modified: 1773827106081
          sortKey: 3200
        requestId: req_4c8880f9f42d4dd583ade9cfb5b73940
        code: |-
          const response = await insomnia.send();

          console.log('Response:', response.data);

          let body;

          try {
            body = JSON.parse(response.data);
          } catch (e) {
            console.log('Raw response:', response.data);
            throw new Error('Invalid JSON response');
          }

          expect(response.status).to.equal(200);
          expect(body.metadata.status).to.equal('success');
          expect(body.data).to.be.an('array');

          // Log count for debugging
          console.log('Total categories:', body.data.length);
      - name: 3. [Kategori] Non-existent ID Returns 404
        meta:
